<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Saver — YouTube Downloader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #ff2d2d;
    --red-dark: #cc0000;
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --text: #f0f0f0;
    --muted: #666;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(255,45,45,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,45,45,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    padding: 48px 0 32px;
    text-align: center;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: var(--red);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 10vw, 88px);
    letter-spacing: 2px;
    line-height: 1;
    color: var(--white);
  }

  h1 span { color: var(--red); }

  .tagline {
    color: var(--muted);
    font-size: 15px;
    margin-top: 8px;
    letter-spacing: 0.5px;
  }

  /* Search Box */
  .search-wrap {
    margin: 40px 0 0;
    position: relative;
  }

  .search-box {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .search-box:focus-within {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(255,45,45,0.1);
  }

  #urlInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    padding: 18px 20px;
    font-size: 15px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
  }

  #urlInput::placeholder { color: var(--muted); }

  #fetchBtn {
    background: var(--red);
    border: none;
    color: white;
    padding: 0 28px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  #fetchBtn:hover { background: var(--red-dark); }
  #fetchBtn:disabled { background: #444; cursor: not-allowed; }

  /* Loader */
  .loader {
    display: none;
    text-align: center;
    padding: 40px;
    color: var(--muted);
  }

  .loader.active { display: block; }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Video Card */
  .video-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-top: 32px;
    animation: slideUp 0.3s ease;
  }

  .video-card.active { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .video-info {
    display: flex;
    gap: 20px;
    padding: 20px;
    align-items: flex-start;
  }

  .thumbnail-wrap {
    position: relative;
    flex-shrink: 0;
    width: 180px;
    border-radius: 10px;
    overflow: hidden;
  }

  .thumbnail-wrap img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
  }

  .duration-badge {
    position: absolute;
    bottom: 6px;
    right: 6px;
    background: rgba(0,0,0,0.85);
    color: white;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 500;
  }

  .video-meta h2 {
    font-size: 17px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 8px;
  }

  .video-stats {
    display: flex;
    gap: 16px;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 4px;
  }

  /* Download Options */
  .download-section {
    border-top: 1px solid var(--border);
    padding: 20px;
  }

  .section-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 14px;
    font-weight: 500;
  }

  .format-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .tab {
    padding: 8px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--red);
    border-color: var(--red);
    color: white;
  }

  .quality-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  .quality-btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .quality-btn:hover { border-color: var(--red); color: var(--red); }
  .quality-btn.selected { background: rgba(255,45,45,0.15); border-color: var(--red); color: var(--red); }

  .download-btn {
    width: 100%;
    padding: 16px;
    background: var(--red);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .download-btn:hover { background: var(--red-dark); transform: translateY(-1px); }
  .download-btn:disabled { background: #333; cursor: not-allowed; transform: none; }

  /* Playlist */
  .playlist-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-top: 32px;
    animation: slideUp 0.3s ease;
  }

  .playlist-card.active { display: block; }

  .playlist-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .playlist-title { font-size: 18px; font-weight: 500; }
  .playlist-count { color: var(--muted); font-size: 14px; }

  .playlist-list {
    max-height: 340px;
    overflow-y: auto;
  }

  .playlist-list::-webkit-scrollbar { width: 4px; }
  .playlist-list::-webkit-scrollbar-track { background: var(--surface); }
  .playlist-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .playlist-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .playlist-item:hover { background: var(--surface2); }
  .playlist-item:last-child { border-bottom: none; }

  .item-num { color: var(--muted); font-size: 13px; min-width: 24px; }

  .item-thumb {
    width: 64px;
    aspect-ratio: 16/9;
    object-fit: cover;
    border-radius: 6px;
    flex-shrink: 0;
  }

  .item-title {
    flex: 1;
    font-size: 14px;
    line-height: 1.3;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .item-dl-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .item-dl-btn:hover { border-color: var(--red); color: var(--red); }

  /* Error */
  .error-msg {
    display: none;
    background: rgba(255,45,45,0.1);
    border: 1px solid rgba(255,45,45,0.3);
    border-radius: 10px;
    padding: 14px 18px;
    color: #ff6b6b;
    margin-top: 16px;
    font-size: 14px;
  }

  .error-msg.active { display: block; }

  /* Status */
  .status-bar {
    display: none;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    margin-top: 16px;
    font-size: 14px;
    color: var(--muted);
    text-align: center;
  }

  .status-bar.active { display: block; }

  footer {
    text-align: center;
    padding: 48px 0 32px;
    color: var(--muted);
    font-size: 13px;
  }

  @media (max-width: 600px) {
    .video-info { flex-direction: column; }
    .thumbnail-wrap { width: 100%; }
    h1 { font-size: 56px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">▶</div>
    </div>
    <h1>YT<span>SAVER</span></h1>
    <p class="tagline">YouTube videos & playlists — MP4 aur MP3 mein download karein</p>
  </header>

  <div class="search-wrap">
    <div class="search-box">
      <input type="text" id="urlInput" placeholder="YouTube video ya playlist URL yahan paste karein..." />
      <button id="fetchBtn" onclick="fetchInfo()">Fetch →</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="status-bar" id="statusBar"></div>
  </div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Video info la raha hai...</p>
  </div>

  <!-- Single Video Card -->
  <div class="video-card" id="videoCard">
    <div class="video-info">
      <div class="thumbnail-wrap">
        <img id="vThumb" src="" alt="thumbnail">
        <span class="duration-badge" id="vDuration"></span>
      </div>
      <div class="video-meta">
        <h2 id="vTitle"></h2>
        <div class="video-stats">
          <span id="vUploader"></span>
          <span id="vViews"></span>
        </div>
      </div>
    </div>

    <div class="download-section">
      <div class="section-label">Format chunein</div>
      <div class="format-tabs">
        <button class="tab active" onclick="setFormat('video', this)">🎬 Video (MP4)</button>
        <button class="tab" onclick="setFormat('audio', this)">🎵 Audio (MP3)</button>
      </div>

      <div id="qualitySection">
        <div class="section-label">Quality chunein</div>
        <div class="quality-grid" id="qualityGrid"></div>
      </div>

      <button class="download-btn" onclick="startDownload()">
        ⬇ Download Karo
      </button>
    </div>
  </div>

  <!-- Playlist Card -->
  <div class="playlist-card" id="playlistCard">
    <div class="playlist-header">
      <div>
        <div class="playlist-title" id="plTitle"></div>
        <div class="playlist-count" id="plCount"></div>
      </div>
    </div>
    <div class="playlist-list" id="playlistList"></div>
  </div>

  <footer>
    Sirf personal use ke liye • yt-dlp powered
  </footer>
</div>

<script>
let currentUrl = '';
let currentFormat = 'video';
let selectedQuality = 'best';
let availableFormats = [];

function setFormat(format, btn) {
  currentFormat = format;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  
  const qualSection = document.getElementById('qualitySection');
  if (format === 'audio') {
    qualSection.style.display = 'none';
    selectedQuality = 'best';
  } else {
    qualSection.style.display = 'block';
    buildQualityGrid(availableFormats);
  }
}

function buildQualityGrid(formats) {
  const grid = document.getElementById('qualityGrid');
  grid.innerHTML = '';
  
  // Always add Best option
  const best = document.createElement('button');
  best.className = 'quality-btn selected';
  best.textContent = '✨ Best';
  best.onclick = () => selectQuality('best', best);
  grid.appendChild(best);
  selectedQuality = 'best';
  
  formats.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'quality-btn';
    btn.textContent = `${f.quality}p`;
    btn.onclick = () => selectQuality(String(f.quality), btn);
    grid.appendChild(btn);
  });
}

function selectQuality(q, btn) {
  selectedQuality = q;
  document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

async function fetchInfo() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return showError('URL daalna zaroori hai!');
  
  currentUrl = url;
  hideAll();
  show('loader');
  clearError();
  
  try {
    const res = await fetch('/info', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url})
    });
    const data = await res.json();
    
    hide('loader');
    
    if (data.error) return showError(data.error);
    
    if (data.type === 'playlist') {
      showPlaylist(data);
    } else {
      showVideo(data);
    }
  } catch(e) {
    hide('loader');
    showError('Server se connection nahi ho raha. Flask server chal raha hai?');
  }
}

function showVideo(data) {
  document.getElementById('vThumb').src = data.thumbnail || '';
  document.getElementById('vTitle').textContent = data.title || 'Unknown';
  document.getElementById('vUploader').textContent = data.uploader || '';
  document.getElementById('vViews').textContent = data.view_count ? formatNum(data.view_count) + ' views' : '';
  document.getElementById('vDuration').textContent = formatDur(data.duration);
  
  availableFormats = data.formats || [];
  buildQualityGrid(availableFormats);
  
  show('videoCard');
}

function showPlaylist(data) {
  document.getElementById('plTitle').textContent = data.title || 'Playlist';
  document.getElementById('plCount').textContent = `${data.count} videos`;
  
  const list = document.getElementById('playlistList');
  list.innerHTML = '';
  
  (data.entries || []).forEach((entry, i) => {
    const item = document.createElement('div');
    item.className = 'playlist-item';
    item.innerHTML = `
      <span class="item-num">${i+1}</span>
      <img class="item-thumb" src="${entry.thumbnail || ''}" onerror="this.style.display='none'" alt="">
      <span class="item-title">${entry.title || 'Unknown'}</span>
      <button class="item-dl-btn" onclick="downloadItem('${entry.url}')">⬇ MP4</button>
      <button class="item-dl-btn" onclick="downloadItemAudio('${entry.url}')">🎵 MP3</button>
    `;
    list.appendChild(item);
  });
  
  show('playlistCard');
}

async function startDownload() {
  const btn = document.querySelector('.download-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Download ho raha hai...';
  showStatus('File download ho rahi hai, thoda wait karein...');
  
  try {
    const res = await fetch('/download', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        url: currentUrl,
        format: currentFormat,
        quality: selectedQuality
      })
    });
    
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'Download failed');
    }
    
    const blob = await res.blob();
    const disposition = res.headers.get('Content-Disposition') || '';
    const fname = disposition.match(/filename="?([^"]+)"?/)?.[1] || 
                  (currentFormat === 'audio' ? 'audio.mp3' : 'video.mp4');
    
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fname;
    a.click();
    
    hideStatus();
    showStatus('✅ Download complete!');
    setTimeout(hideStatus, 3000);
  } catch(e) {
    showError(e.message);
    hideStatus();
  }
  
  btn.disabled = false;
  btn.textContent = '⬇ Download Karo';
}

async function downloadItem(url) {
  showStatus('Downloading: ' + url.slice(0, 50) + '...');
  try {
    const res = await fetch('/download', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url, format: 'video', quality: 'best'})
    });
    if (!res.ok) throw new Error('Download failed');
    const blob = await res.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'video.mp4';
    a.click();
    hideStatus();
  } catch(e) { showError(e.message); hideStatus(); }
}

async function downloadItemAudio(url) {
  showStatus('MP3 download ho rahi hai...');
  try {
    const res = await fetch('/download', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url, format: 'audio', quality: 'best'})
    });
    if (!res.ok) throw new Error('Download failed');
    const blob = await res.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'audio.mp3';
    a.click();
    hideStatus();
  } catch(e) { showError(e.message); hideStatus(); }
}

// Utility functions
function formatDur(s) {
  if (!s) return '';
  const m = Math.floor(s/60), sec = s%60;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function formatNum(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n;
}

function show(id) { document.getElementById(id).classList.add('active'); }
function hide(id) { document.getElementById(id).classList.remove('active'); }
function hideAll() {
  ['loader','videoCard','playlistCard'].forEach(hide);
}
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = '⚠ ' + msg;
  el.classList.add('active');
}
function clearError() { document.getElementById('errorMsg').classList.remove('active'); }
function showStatus(msg) {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.classList.add('active');
}
function hideStatus() { document.getElementById('statusBar').classList.remove('active'); }

// Enter key support
document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchInfo();
});
</script>
</body>
</html>
